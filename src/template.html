<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- here is the sidebar nav -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebarHeader">
          <h3>My Projects</h3>
        </div>
        <ul class="navLinks">
            <!-- here is where u add new "projects"-->
          <li><a href="#" class="active">Default</a></li>
        </ul>
      </nav>

    <!-- this is to test out the dialog -->
    <dialog id="dialog">
        <form method="dialog" id="newTodo">
            <div id="inputContainer">
                <label> Title:
                    <input type="text" id="titleInput" required>
                </label>
                <label> Due Date:
                    <input type="date" id="dueDateInput" required>
                </label>
                <label> Description:
                    <input type="text" id="descriptionInput">
                </label>
                <label> Priority:
                    <select name="priority" id="priorityInput">
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                </label>
            </div>
                <input type="submit" id="submitBtn">
                <input type="submit" id="closeBtn" value="Close">
        </form>
    </dialog>
    <button id="newTodoBtn">Add New Todo</button>
     <script src="modules/todo.js"></script>      <!-- ofc replace this with index.js once we import everything -->
</body>
</html>
