<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- here is the sidebar nav -->
     <div id="sidebarContainer">
        <nav id="sidebar">
            <div id="sidebarHeader">
              <h3>My Projects</h3>
            </div>
            <ul class="navLinks">
                <!-- here is where u add new "projects", form that takes in title input-->
                <li id="newProjectBtn">Add New Project</li>
    
                <li>Default</li>
            </ul>
          </nav>
     </div>
    <!-- Here should be the todo container on the right side of the screen -->
     <div id="todoContainer"></div>

    <!-- New Project Dialog -->
    <dialog id="projectDialog">
        <form id="newProject">
            <label>
                <input type="text" id="projectTitleInput" required>
            </label>
            <input type="submit" id="projectSubmitBtn">
            <input type="submit" id="projectCloseBtn" value="Close">
        </form>
    </dialog>
    
    <!-- New Todo Dialog-->
    <dialog id="dialog">
        <form method="dialog" id="newTodo">
            <div id="inputContainer">
                <label> Title:
                    <input type="text" id="titleInput" required>
                </label>
                <label> Due Date:
                    <input type="date" id="dueDateInput" required>
                </label>
                <label> Description:
                    <input type="text" id="descriptionInput">
                </label>
                <label> Priority:
                    <select name="priority" id="priorityInput">
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                </label>
                <label> Select Project:
                    <select name="project" id="selectProjectInput" required>
                        <option value="High">Default</option>
                    </select>
                </label>
            </div>
                <input type="submit" id="submitBtn">
                <input type="submit" id="closeBtn" value="Close">
        </form>
    </dialog>
    <button id="newTodoBtn">Add New Todo</button>
     <script src="index.js"></script>   
</body>
</html>
